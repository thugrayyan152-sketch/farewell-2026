<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farewell 2026 - Guard Verification</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #FFD700;
            --dark-gold: #B8860B;
            --purple: #6B46C1;
            --dark-purple: #4C1D95;
            --black: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, rgba(10,10,10,0.85) 0%, rgba(22,33,62,0.9) 100%),
                        url('https://images.unsplash.com/photo-1517457373958-b7bdd4587205?w=1920&q=80') center/cover fixed;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
            animation: guardPulse 2s infinite;
        }

        @keyframes guardPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.8)); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            letter-spacing: 0.1em;
        }

        .scanner-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.1);
            margin-bottom: 20px;
        }

        .scanner-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        #reader {
            width: 100%;
        }

        .scan-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 3px solid var(--gold);
            border-radius: 20px;
            pointer-events: none;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.7);
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .manual-entry {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
        }

        .manual-title {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 0.05em;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            color: var(--black);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.4);
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 30px;
            margin-top: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            display: none;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .status-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 15px;
        }

        .status-allowed {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            animation: successPulse 1s ease;
            box-shadow: 0 0 30px rgba(17, 153, 142, 0.5);
        }

        .status-denied {
            background: linear-gradient(135deg, #eb3349, #f45c43);
            color: white;
            animation: errorShake 0.5s ease;
            box-shadow: 0 0 30px rgba(235, 51, 73, 0.5);
        }

        @keyframes successPulse {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .student-details {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .detail-value {
            font-weight: 600;
            color: var(--gold);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349, #f45c43);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 25px;
            padding: 12px 25px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 25px;
            text-decoration: none;
            color: var(--gold);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .back-link:hover {
            background: var(--gold);
            color: var(--black);
            transform: translateY(-2px);
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 15px;
            }
            .header {
                padding: 20px;
            }
            .header-icon {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }
            h1 {
                font-size: 24px;
            }
            .card {
                padding: 20px;
            }
            #reader {
                height: 250px;
            }
            .result-card {
                padding: 20px;
            }
            .action-buttons {
                grid-template-columns: 1fr;
            }
            .input-group {
                flex-direction: column;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .password-box {
                padding: 2rem;
                margin: 20px;
            }
            .password-box h2 {
                font-size: 1.5rem;
            }
            .password-input {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 5px;
            }
            .container {
                padding: 10px;
            }
            .header {
                padding: 15px;
            }
            .header-icon {
                width: 50px;
                height: 50px;
                font-size: 1.8rem;
            }
            h1 {
                font-size: 20px;
            }
            .subtitle {
                font-size: 0.85rem;
            }
            .card {
                padding: 15px;
                border-radius: 15px;
            }
            .card-title {
                font-size: 1.1rem;
            }
            #reader {
                height: 200px;
            }
            .result-card {
                padding: 15px;
            }
            .result-icon {
                width: 50px;
                height: 50px;
                font-size: 1.8rem;
            }
            .student-details h3 {
                font-size: 1.1rem;
            }
            .btn {
                padding: 10px 16px;
                font-size: 0.85rem;
            }
            .manual-input {
                font-size: 0.9rem;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .stat-value {
                font-size: 20px;
            }
            .back-link {
                font-size: 0.8rem;
            }
            .password-box {
                padding: 1.5rem;
                margin: 15px;
            }
            .password-box h2 {
                font-size: 1.3rem;
            }
            .password-input {
                padding: 10px 15px;
                font-size: 0.9rem;
            }
            .password-btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 360px) {
            h1 { font-size: 18px; }
            .header-icon {
                width: 40px;
                height: 40px;
                font-size: 1.5rem;
            }
            .card { padding: 12px; }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .stat-value { font-size: 18px; }
        }

        /* Password Protection Overlay */
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(10,10,10,0.7) 0%, rgba(22,33,62,0.7) 100%),
                        url('https://images.unsplash.com/photo-1517457373958-b7bdd4587205?w=1920&q=80') center/cover fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .password-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.1);
        }

        .password-box h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--gold), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .password-box p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .password-input {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin-bottom: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .password-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .password-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .password-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .password-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }

        .password-error {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }

        .main-content.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Password Protection Overlay -->
    <div class="password-overlay" id="passwordOverlay">
        <div class="password-box">
            <h2>🛡️ Guard Access</h2>
            <p>Enter password to access Guard Portal</p>
            <input type="password" class="password-input" id="passwordInput" placeholder="Enter password...">
            <button class="password-btn" onclick="checkPassword()">Unlock</button>
            <div class="password-error" id="passwordError">Incorrect password. Please try again.</div>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <div class="header-icon">🛡️</div>
            <h1>Guard Portal</h1>
            <p class="subtitle">Scan QR codes to verify student entry</p>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">-</div>
                <div class="stat-label">Total Students</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="enteredCount">-</div>
                <div class="stat-label">Entered</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="remainingCount">-</div>
                <div class="stat-label">Remaining</div>
            </div>
        </div>

        <div class="scanner-card">
            <div class="scanner-container">
                <div id="reader"></div>
                <div class="scan-overlay">
                    <div class="scan-line"></div>
                </div>
            </div>

            <div class="manual-entry">
                <div class="manual-title">⌨️ Or enter name manually</div>
                <div class="input-group">
                    <input type="text" id="manualName" placeholder="Enter student name...">
                    <button class="btn btn-primary" onclick="verifyManual()">Verify</button>
                </div>
            </div>
        </div>

        <div class="result-card" id="resultCard">
            <div class="result-header">
                <div class="status-icon" id="statusIcon">✓</div>
                <h2 id="statusText">Entry Allowed</h2>
            </div>

            <div class="student-details">
                <div class="detail-row">
                    <span class="detail-label">Name</span>
                    <span class="detail-value" id="studentName">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Roll Number</span>
                    <span class="detail-value" id="rollNumber">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Father Name</span>
                    <span class="detail-value" id="fatherName">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Status</span>
                    <span class="detail-value" id="entryStatus">-</span>
                </div>
            </div>

            <div class="action-buttons" id="actionButtons">
                <button class="btn btn-success" id="allowBtn" onclick="allowEntry()">✅ Allow Entry</button>
                <button class="btn btn-danger" onclick="clearResult()">❌ Cancel</button>
            </div>
        </div>

        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script>
        // API Configuration - Change this to your backend URL after deploying
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? ''  // Empty for localhost (same origin)
            : 'https://farewell-2026-production.up.railway.app';  // Replace with your deployed backend URL

        let currentStudent = null;
        let html5QrCode;

        // Initialize scanner
        function initScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start(
                { facingMode: "environment" },
                config,
                onScanSuccess,
                onScanFailure
            ).catch(err => {
                console.error("Scanner error:", err);
                document.getElementById('reader').innerHTML = 
                    '<div style="padding: 50px; text-align: center; color: #666;">' +
                    '<p>📷 Camera access required</p>' +
                    '<p style="font-size: 14px;">Please allow camera permissions or use manual entry</p>' +
                    '</div>';
            });
        }

        function onScanSuccess(decodedText) {
            verifyStudent(decodedText);
        }

        function onScanFailure(error) {
            // console.warn(`QR scan error: ${error}`);
        }

        async function verifyManual() {
            const name = document.getElementById('manualName').value.trim();
            if (name) verifyStudent(name);
        }

        async function verifyStudent(name) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });

                const data = await response.json();
                showResult(data);
            } catch (error) {
                alert('❌ Verification failed');
            }
        }

        function showResult(data) {
            const resultCard = document.getElementById('resultCard');
            const statusIcon = document.getElementById('statusIcon');
            const statusText = document.getElementById('statusText');
            const allowBtn = document.getElementById('allowBtn');

            if (data.exists) {
                currentStudent = data.student;
                document.getElementById('studentName').textContent = data.student.name;
                document.getElementById('rollNumber').textContent = data.student.roll_number || 'N/A';
                document.getElementById('fatherName').textContent = data.student.father_name || 'N/A';
                document.getElementById('entryStatus').textContent = data.student.has_entered ? 'Already Entered' : 'Not Entered';

                if (data.canEnter) {
                    statusIcon.textContent = '✓';
                    statusIcon.className = 'status-icon status-allowed';
                    statusText.textContent = '✅ Entry Allowed';
                    statusText.style.color = '#11998e';
                    allowBtn.disabled = false;
                    allowBtn.style.display = 'block';
                } else {
                    statusIcon.textContent = '✗';
                    statusIcon.className = 'status-icon status-denied';
                    statusText.textContent = '❌ Already Entered';
                    statusText.style.color = '#eb3349';
                    allowBtn.disabled = true;
                    allowBtn.style.display = 'none';
                }
            } else {
                statusIcon.textContent = '?';
                statusIcon.className = 'status-icon status-denied';
                statusText.textContent = '❌ Student Not Found';
                statusText.style.color = '#eb3349';
                document.getElementById('studentName').textContent = 'Unknown';
                document.getElementById('rollNumber').textContent = '-';
                document.getElementById('fatherName').textContent = '-';
                document.getElementById('entryStatus').textContent = 'Not Registered';
                allowBtn.style.display = 'none';
            }

            resultCard.style.display = 'block';
            resultCard.scrollIntoView({ behavior: 'smooth' });
        }

        async function allowEntry() {
            if (!currentStudent) return;

            try {
                const response = await fetch(`${API_BASE_URL}/api/entry`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: currentStudent.name })
                });

                const data = await response.json();

                if (data.success) {
                    alert('✅ Entry recorded successfully!');
                    clearResult();
                    updateStats();
                }
            } catch (error) {
                alert('❌ Failed to record entry');
            }
        }

        function clearResult() {
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('manualName').value = '';
            currentStudent = null;
        }

        async function updateStats() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/students`);
                const students = await response.json();
                const entered = students.filter(s => s.has_entered).length;

                document.getElementById('totalCount').textContent = students.length;
                document.getElementById('enteredCount').textContent = entered;
                document.getElementById('remainingCount').textContent = students.length - entered;
            } catch (error) {
                console.error('Stats update failed:', error);
            }
        }

        // Enter key support
        document.getElementById('manualName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyManual();
        });

        // Initialize
        initScanner();
        updateStats();
        setInterval(updateStats, 5000); // Update stats every 5 seconds

        // Password Protection
        const CORRECT_PASSWORD = 'qwer1234@#$&qazWSX';

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const error = document.getElementById('passwordError');

            if (input === CORRECT_PASSWORD) {
                document.getElementById('passwordOverlay').style.display = 'none';
                sessionStorage.setItem('guardAuthenticated', 'true');
            } else {
                error.style.display = 'block';
                document.getElementById('passwordInput').value = '';
            }
        }

        // Check if already authenticated in this session
        if (sessionStorage.getItem('guardAuthenticated') === 'true') {
            document.getElementById('passwordOverlay').style.display = 'none';
        }

        // Allow Enter key to submit
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
